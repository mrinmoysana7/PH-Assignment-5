<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Favicon -->
     <link rel="shortcut icon" href="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" type="image/x-icon">
     
     <!-- Stylesheet -->
     <link rel="stylesheet" href="./styles/style.css">
     
     <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen">
    <section class="navbar p-0">
    <div class="navbar px-1 md:px-20 md:py-4 bg-base-100 shadow-sm">
        <div class="md:flex-1">
            <div class="flex gap-1 items-center">
                <img class="w-9 h-9" src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="">
                <h2 class=" font-semibold text-2xl ">GitHub Issues Tracker</h2>
            </div>
        </div>
        <div class="md:flex gap-2">
            <input id="search-Input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
            <div class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</div>
        </div>
    </div>
    </section>

    <section class="all-tabs w-9/12 mx-auto mt-[60px] flex gap-2 rounded-lg mb-4 bg-white p-6 shadow-md">
        
            <button 
             id="tab-all" 
             onclick="switchTab('all')" 
             class=" font-medium border border-base-300 px-8 py-2.5 text-[#64748B] text-[12px] rounded-lg cursor-pointer transition-all duration-200">
              All
            </button> 

            <button 
             id="tab-open" 
             onclick="switchTab('open')" 
             class=" font-medium border border-base-300 px-8 py-2.5 text-[#64748B] text-[12px] rounded-lg cursor-pointer transition-all duration-200">
            Open
            </button>

            <button 
             id="tab-closed" 
             onclick="switchTab('closed')" 
             class=" font-medium border border-base-300 px-8 py-2.5 text-[#64748B] text-[12px] rounded-lg cursor-pointer transition-all duration-200">
            Closed
            </button> 
       
        
    </section>

    <section class="issue-counting-section w-9/12 mx-auto shadow-md">
        <div class="flex justify-between bg-white p-6 gap-2 rounded-t-lg">
            <div class="flex items-center gap-2">
                <div class="bg-[#ECE4FF] p-2.5 rounded-full">
                    <img src="./B13-A5-Github-Issue-Tracker/assets/Aperture.png" alt=""> 
                </div>
                <div>
                    <h2 class="font-semibold text-xl"><span id="count-issues">50</span> Issues</h2>   
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <span class=""><i class="fa-solid fa-circle fa-2xs" style="color: rgb(68, 180, 82);"></i>
                Open
                </span>
                <span class=""><i class="fa-solid fa-circle fa-2xs" style="color: rgb(113, 72, 233);"></i> 
                Closed
                </span>
            </div>
        </div> 

        
        
    </section>

    <section id="issue-container" class="w-9/12 mx-auto border-t-2 border-gray-300 bg-[#FBFBFB] grid grid-cols-4 gap-3 p-6 shadow-md rounded-b-lg mb-[60px]">
        <div class="w-[256px] shadow-lg rounded-t-md border-t-2 border-[#00A96E] p-4 space-y-3">
            <div class="flex items-center justify-between">
            <div><img class="" src="./B13-A5-Github-Issue-Tracker/assets/Open-Status.png" alt="">
            </div>
            <div id="priority-box">
                <p class="font-medium text-[12px] rounded-full w-[80px] py-1 px-6 bg-[#FEECEC]
                ">HIGH</p>
            </div>
            </div>
            <div>
            <h2 class="text-[14px] font-semibold text-[#1F2937] mb-3">Fix navigation menu on mobile devices</h2>
            <p class="text-[#64748B] text-[12px]">The navigation menu doesn't collapse properly on mobile devices...</p>
            </div>           
            <div class="flex gap-1">
                <div class="">
                    <div class="flex"><p class="border-2 text-[#EF4444] border-[#FECACA] font-medium text-[12px] rounded-full py-1 px-2 bg-[#FEECEC]
                    "><i class="fa-solid fa-bug" style="color: #EF4444;"></i> Bug</p></div>
                </div>
                <div>
                    <div class="flex"><p class="border-2 border-[#FDE68A] font-medium text-[12px] text-[#D97706] rounded-full py-1 px-2 bg-[#FFF8DB]
                    "><i class="fa-regular fa-life-ring" style="color: #D97706;"></i> help wanted</p></div>
                </div>
                <div class="hidden">
                    <div class="flex"><p class="border-2 font-medium text-[12px] rounded-full py-1 px-2 bg-[#FEECEC]
                    "><i class="fa-duotone fa-solid fa-wand-magic-sparkles" style="--fa-primary-color: rgb(113, 72, 233); --fa-secondary-color: rgb(113, 72, 233);"></i> Enhancement</p></div>
                </div>
            </div> 
            <div>
                <div class="border-t-2 border-gray-300">
                    <div class="px-4 pt-4">
                    <p class="mb-2 text-[12px] text-[#64748B]">#1 by john_doe</p>
                    <p class="text-[12px] text-[#64748B]">1/15/2024</p>
                    </div>
                </div>
            </div>  
        </div>
    </section>


    <script src="./script/home.js"></script>
</body>
</html>
