<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>

    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Favicon -->
     <link rel="shortcut icon" href="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" type="image/x-icon">
     
     <!-- Stylesheet -->
     <link rel="stylesheet" href="./styles/style.css">
     
     <!-- Google Font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <!-- DaisyUI -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen pb-[60px]">
    <section class="navbar p-0">
            <div class="navbar grid grid-cols-1 md:grid-cols-2 px-10 py-3 space-y-3 md:px-20 md:py-4 bg-base-100 shadow-sm">
                <div class="md:flex-1">
                    <div class="flex gap-1 items-center">
                        <img class="w-9 h-9" src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="">
                        <h2 class=" font-semibold text-2xl ">GitHub Issues Tracker</h2>
                    </div>
                </div>
                <div class="md:flex-1 text-center md:text-end">
                    <input id="search-Input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                    <button id="search-btn" class="btn btn-primary">Search</button>
                </div>
            </div>
    </section>

    <section class="all-tabs flex justify-center md:justify-start w-9/12 mx-auto mt-[60px] rounded-lg mb-4 bg-white p-6 shadow-md">
        
            <div class="flex gap-3 items-center justify-center">
                <button 
             id="tab-all" 
             onclick="switchTab('all')" 
             class="w-[70px] md:w-[120px] font-medium border border-base-300 md:px-8 py-2.5 text-[#64748B] text-[12px] rounded-lg cursor-pointer transition-all duration-200">
              All
            </button> 

            <button 
             id="tab-open" 
             onclick="switchTab('open')" 
             class="w-[70px] md:w-[120px] font-medium border border-base-300 md:px-8 py-2.5 text-[#64748B] text-[12px] rounded-lg cursor-pointer transition-all duration-200">
            Open
            </button>

            <button 
             id="tab-closed" 
             onclick="switchTab('closed')" 
             class="w-[70px] md:w-[120px] font-medium border border-base-300 md:px-8 py-2.5 text-[#64748B] text-[12px] rounded-lg cursor-pointer transition-all duration-200">
            Closed
            </button>
            </div> 
       
        
    </section>

    <section class="issue-counting-section w-9/12 mx-auto shadow-md">
        <div class="grid grid-cols-1 md:grid-cols-2 bg-white p-6 gap-2 rounded-t-lg">
            <div class="flex justify-between md:justify-start items-center gap-4">
                <div class="bg-[#ECE4FF] p-2.5 rounded-full">
                    <img src="./B13-A5-Github-Issue-Tracker/assets/Aperture.png" alt=""> 
                </div>
                <div>
                    <h2 class="font-semibold text-xl"><span id="count-issues">50</span> Issues</h2>   
                    <p class="text-[#64748B] text-left">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex justify-center md:justify-end items-center gap-4">
                <span class=""><i class="fa-solid fa-circle fa-2xs" style="color: rgb(68, 180, 82);"></i>
                Open
                </span>
                <span class=""><i class="fa-solid fa-circle fa-2xs" style="color: rgb(113, 72, 233);"></i> 
                Closed
                </span>
            </div>
        </div> 

        
        
    </section>

    <section id="issue-container" class="w-9/12 mx-auto border-t-2 border-gray-300 bg-[#FBFBFB] grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 p-6 shadow-md rounded-b-lg ">

    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    
    <dialog id="issue_modal" class="modal">
  <div class="modal-box">

    <!-- dynamic content -->
    <div id="display_modal"></div>

    <!-- close button -->
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary text-white border-none">Close</button>
      </form>
    </div>

  </div>
</dialog>

    <script src="./script/home.js"></script>
</body>
</html>
